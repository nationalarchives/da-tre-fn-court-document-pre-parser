on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
jobs:
  ecr-deploy:
    permissions:
      id-token: write
      contents: read
    uses: nationalarchives/da-tre-github-actions/.github/workflows/docker-build-and-ecr-deploy-with-wiz-scan.yml@110559c0bbef60ed4a81ff8f66f22f1bcef67fd6 # v0.0.82
    with:
      docker_image_name: 'da-tre-fn-court-document-pre-parser'
      build_dir: '.'
      ecr_registry_path: 'tre-v2'
    secrets:
      AWS_OPEN_ID_CONNECT_ROLE_ARN: ${{ secrets.AWS_OPEN_ID_CONNECT_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
      WIZ_PROJECT_TRE: ${{ secrets.WIZ_PROJECT_TRE }}
